# YOLOv5 — E01 autoral (pig fixo)
# Pesos clássicos (repo ultralytics/yolov5 via PyPI): yolov5n.pt | yolov5s.pt | ...
# Doc Ultralytics (yolov5nu, yolov5su, ...) exige biblioteca ultralytics — não usar aqui.

defaults:
  imgsz: 640
  epochs: 100
  batch: 16
  patience: 20
  seed: 42
  conf_thres: 0.25
  workers: 4
  device: auto
  batch_cpu: 8

dataset:
  name: pig_kaggle
  description: "Particao fixa pig/train + pig/val (consolidada no repo)"

experiments:
  E01:
    framework: yolov5
    model_label: YOLOv5s_autoral
    weights_init: yolov5s.pt  # mais simples: yolov5n.pt | equilíbrio otimizado: yolov5s.pt
    run_name: E01_yolov5s_pig
    train: true
